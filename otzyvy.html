    mesta: {

        "Отели и туризм: гостиницы, хостелы, базы отдыха, санатории.",
        "Развлечения и отдых: парки аттракционов, кинотеатры, зоопарки, квесты.",
        "Красота и спорт: салоны красоты, барбершопы, фитнес-клубы, бассейны.",
        "Медицинские заведения: частные клиники, стоматологии, лаборатории анализов.",
        "Торговля: торговые центры, супермаркеты, автосалоны, вещевые рынки.",
      ],
    },
    uslugi: {

      lead: "Действия, которые компании или бизнесы выполняют за деньги клиента.",
      items: [

        "Бытовые услуги: клининг, химчистка, ремонт обуви, ателье.",
        "Транспорт и логистика: такси, каршеринг, грузоперевозки, доставка посылок.",
        "Ремонт и автосервис: СТО, шиномонтаж, ремонт квартир, сборка мебели.",
        "Связь и интернет: мобильные операторы, домашний интернет, спутниковое ТВ.",
        "Обучение: коммерческие курсы, автошколы, языковые школы.",
        "Организация мероприятий: проведение свадеб, фотосессии, кейтеринг.",
      ],
    },
    sajty: {
      title: "🌐 Сайты",
      lead: "Онлайн-платформы, сервисы и мобильные приложения, где весь опыт пользователя проходит в интернете.",
      items: [
        "Маркетплейсы и интернет-магазины: платформы заказа товаров и одежды.",
        "Стриминг и медиа: онлайн-кинотеатры, музыкальные платформы, видеохостинги.",
        "Игры: онлайн-игры, мобильные приложения игр, игровые магазины.",
        "Сервисы объявлений: платформы для покупки/продажи вещей, поиска недвижимости.",
        "Полезный софт: мобильные приложения банков, планировщики, фоторедакторы.",
      ],
    },
    rabota: {
      title: "💼 Работа и Карьера",
      lead: "Отзывы сотрудников (бывших и нынешних) о компаниях как о работодателях.",
      items: [
        "Крупный сетевой бизнес: отзывы о работе в супермаркетах, банках, общепите.",
        "IT и digital-компании: отзывы разработчиков, маркетологов, дизайнеров.",
        "Производство и заводы: условия труда на фабриках, комбинатах, шахтах.",
        "Кадровые агентства: отзывы о компаниях, которые помогают найти работу.",
        "Платформы для фриланса и подработки: опыт работы курьером, таксистом, сборщиком заказов.",
      ],
    },
    lyudi: {
      title: "👥 Люди и Персоны",
      lead: "Отзывы о конкретных специалистах, экспертах и медийных личностях (оценка человека, а не компании).",
      items: [
        "Частные мастера: репетиторы, няни, сиделки, сантехники, электрики.",
        "Бьюти-мастера: частные парикмахеры, мастера маникюра, лэшмейкеры.",
        "Здоровье и психология: конкретные врачи, психологи, психотерапевты, тренеры.",
        "Инфобизнес и блогеры: авторы именных онлайн-курсов, коучи, гиды.",
      ],
    },
    obshchestvo: {
      title: "🏛️ Общество и Государство",
      lead: "Некоммерческие, социальные, инфраструктурные и государственные объекты.",
      items: [
        "Госуслуги и ведомства: МФЦ, налоговые инспекции, ПФР, ЗАГСы, ГИБДД.",
        "Образование: государственные школы, детские сады, колледжи, вузы.",
        "Медицина: городские поликлиники, государственные больницы, роддома.",
        "Городская среда: бесплатные парки, набережные, общественные пляжи, площади.",
        "Инфраструктура и ЖКХ: общественный транспорт, вокзалы, управляющие компании (УК).",
      ],
    },
  };

  var pop = document.getElementById("oz-pop");
  var popTitle = document.getElementById("oz-pop-title");
  var popLead = document.getElementById("oz-pop-lead");
  var popList = document.getElementById("oz-pop-list");
  function openCatInfo(key) {
    var info = CAT_INFO[key];
    if (!info || !pop) return;
    if (popTitle) popTitle.textContent = info.title;
    if (popLead) popLead.textContent = info.lead;
    if (popList) {
      popList.innerHTML = info.items
        .map(function (item) {
          return "<li>" + esc(item) + "</li>";
        })
        .join("");
    }
    pop.hidden = false;
    document.body.style.overflow = "hidden";
  }
  function closeCatInfo() {
    if (!pop || pop.hidden) return;
    pop.hidden = true;
    document.body.style.overflow = "";
  }
  document.querySelectorAll(".oz-i").forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      openCatInfo(btn.getAttribute("data-cat"));
    });
    btn.addEventListener("mouseenter", function () {
      if (window.matchMedia("(hover: hover)").matches) {
        openCatInfo(btn.getAttribute("data-cat"));
      }
    });
  });
  var popBg = document.getElementById("oz-pop-bg");
  var popX = document.getElementById("oz-pop-x");
  if (popBg) popBg.addEventListener("click", closeCatInfo);
  if (popX) popX.addEventListener("click", closeCatInfo);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeCatInfo();
  });

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
  function slugify(name) {
    return String(name || "")
      .trim()
      .toLowerCase()
      .replace(/ё/g, "е")
      .replace(/[^a-z0-9а-я]+/gi, "-")
      .replace(/^-+|-+$/g, "");
  }
  function stars(n) {
    n = Math.min(5, Math.max(0, +n || 0));
    return "★".repeat(n) + "☆".repeat(5 - n);
  }
  function fmtDate(d) {
    if (!d) return "";
    try {
      var dt = new Date(d);
      if (isNaN(dt.getTime())) return String(d);
      return dt.toLocaleDateString("ru-RU", {
        day: "numeric",
        month: "long",
        year: "numeric",
      });
    } catch (e) {
      return String(d);
    }
  }
  function reviewHref(r) {
    var key = slugify(r.name) || r.id || "";
    return "otziv.html?id=" + encodeURIComponent(key);
  }
  function getCat() {
    try {
      var c = (new URLSearchParams(location.search).get("c") || "").trim().toLowerCase();
      return CATS[c] ? c : "";
    } catch (e) {
      return "";
    }
  }
  function getTag() {
    try {
      var t = (new URLSearchParams(location.search).get("tag") || "").trim().toLowerCase();
      if (!t) return "";
      if (window.OZ_TAGS && OZ_TAGS.bySlug[t]) return t;
      return window.OZ_TAGS ? OZ_TAGS.slugify(t) : t;
    } catch (e) {
      return "";
    }
  }
  function getQ() {
    try {
      return (new URLSearchParams(location.search).get("q") || "").trim();
    } catch (e) {
      return "";
    }
  }
  function normQ(s) {
    return String(s || "")
      .toLowerCase()
      .replace(/ё/g, "е")
      .replace(/\s+/g, " ")
      .trim();
  }
  function matchesSearch(item, q) {
    var nq = normQ(q);
    if (!nq || !item) return false;
    if (normQ(item.name).indexOf(nq) !== -1) return true;
    var qSlug = window.OZ_TAGS ? OZ_TAGS.slugify(q) : slugify(q);
    var slugs = window.OZ_TAGS ? OZ_TAGS.parse(item.tags) : [];
    for (var i = 0; i < slugs.length; i++) {
      var slug = slugs[i];
      if (!slug) continue;
      if (slug.indexOf(qSlug) !== -1 || slug.indexOf(nq) !== -1) return true;
      var tname = window.OZ_TAGS ? OZ_TAGS.name(slug) : slug;
      if (normQ(tname).indexOf(nq) !== -1) return true;
    }
    if (normQ(item.tags).indexOf(nq) !== -1) return true;
    return false;
  }

  var darkSwitch = document.getElementById("darkSwitch");
  if (darkSwitch) {
    var saved = localStorage.getItem("t");
    if (saved !== "light" && saved !== "dark") saved = localStorage.getItem("oz-theme");
    var dark = saved !== "light";
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    darkSwitch.checked = dark;
    darkSwitch.addEventListener("change", function () {
      var on = darkSwitch.checked;
      document.documentElement.setAttribute("data-theme", on ? "dark" : "light");
      localStorage.setItem("t", on ? "dark" : "light");
      try {
        localStorage.removeItem("oz-theme");
      } catch (e) {}
    });
  }
  var bm = document.getElementById("bm");
  var cn = document.getElementById("cn");
  if (bm && cn) {
    bm.addEventListener("click", function () {
      var open = cn.classList.toggle("dp");
      bm.classList.toggle("ce", open);
      bm.setAttribute("aria-expanded", open ? "true" : "false");
      cn.setAttribute("aria-hidden", open ? "false" : "true");
    });
  }

  var catKey = getCat();
  var catName = catKey ? CATS[catKey] : "";
  var tagKey = getTag();
  var tagName = tagKey && window.OZ_TAGS ? OZ_TAGS.name(tagKey) : tagKey;
  var qKey = getQ();
  var catsEl = document.getElementById("oz-cats");
  var listEl = document.getElementById("oz-list");
  var emptyEl = document.getElementById("oz-empty");
  var backEl = document.getElementById("oz-back");
  var titleEl = document.getElementById("oz-title");
  var leadEl = document.getElementById("oz-lead");

  if (!catKey && !tagKey && !qKey) {
    applyHubSeo();
    if (backEl) {
      backEl.hidden = false;
      backEl.href = "/";
      backEl.textContent = "← на главную";
    }
    if (window.OZ_TAGS && OZ_TAGS.loadUserTags) OZ_TAGS.loadUserTags();
    return;
  }

  function runList() {
    if (tagKey && window.OZ_TAGS) tagName = OZ_TAGS.name(tagKey);
    if (catsEl) catsEl.hidden = true;
    if (listEl) listEl.hidden = false;
    if (backEl) {
      backEl.hidden = false;
      backEl.href = "otzyvy.html";
      backEl.textContent = "← назад";
    }

    if (qKey) {
      if (titleEl) titleEl.textContent = "Поиск";
      if (leadEl) leadEl.textContent = "Результаты по названию и тегам. Нажмите, чтобы открыть.";
      if (!document.querySelector('meta[name="robots"][content="noindex, follow"]')) {
        var robotsQ = document.createElement("meta");
        robotsQ.name = "robots";
        robotsQ.content = "noindex, follow";
        document.head.appendChild(robotsQ);
      }
      document.title = "Поиск — ot-ziv.com";
    } else if (tagKey) {
      if (titleEl) titleEl.textContent = "#" + tagName;
      if (leadEl) leadEl.textContent = "Отзывы с этим тегом. Нажмите, чтобы открыть.";
      if (!document.querySelector('meta[name="robots"][content="noindex, follow"]')) {
        var robots = document.createElement("meta");
        robots.name = "robots";
        robots.content = "noindex, follow";
        document.head.appendChild(robots);
      }
    } else {
      if (titleEl) titleEl.textContent = catName;
      if (leadEl) leadEl.textContent = "Отзывы в категории. Нажмите, чтобы открыть.";
    }

    fetch("data/published.json?t=" + Date.now())
      .then(function (r) {
        if (!r.ok) throw new Error("load");
        return r.json();
      })
      .then(function (data) {
        var items = Array.isArray(data) ? data : [];
        items = items
          .map(function (item) {
            if (!item || typeof item === "string") return null;
            if (!item.name || !item.text) return null;
            if (qKey) {
              if (!matchesSearch(item, qKey)) return null;
            } else if (tagKey) {
              if (!(window.OZ_TAGS && OZ_TAGS.has(item, tagKey))) return null;
            } else if (String(item.category || "").trim() !== catName) {
              return null;
            }
            return item;
          })
          .filter(Boolean)
          .reverse();

        if (qKey && !items.length) {
          try {
            history.replaceState(null, "", "otzyvy.html");
          } catch (e) {}
          applyHubSeo();
          if (catsEl) catsEl.hidden = false;
          if (listEl) listEl.hidden = true;
          if (backEl) {
            backEl.hidden = false;
            backEl.href = "/";
            backEl.textContent = "← на главную";
          }
          if (titleEl) titleEl.textContent = "Отзывы";
          if (leadEl) leadEl.textContent = "Выберите категорию";
          if (emptyEl) {
            emptyEl.hidden = false;
            emptyEl.classList.add("oz-empty-search");
            emptyEl.textContent = "По запросу ничего не найдено.";
          }
          return;
        }

        if (qKey) {
          if (titleEl) titleEl.textContent = "Поиск: " + qKey;
          applyCollectionSeo({
            title: "Поиск: " + qKey,
            description: "Результаты поиска «" + qKey + "» по названию и тегам на ot-ziv.com.",
            url: SITE + "/otzyvy.html?q=" + encodeURIComponent(qKey),
            items: items,
          });
          document.title = "Поиск: " + qKey + " — ot-ziv.com";
        } else if (tagKey) {
          // Страницы тегов не для индекса: только follow + человекочитаемое имя из tags.js/tags.json
          applyCollectionSeo({
            title: tagName,
            description: "Подборка отзывов по тегу «" + tagName + "» на ot-ziv.com.",
            url: SITE + "/otzyvy.html?tag=" + encodeURIComponent(tagKey),
            items: items,
          });
          document.title = "#" + tagName + " — ot-ziv.com";
        } else {
          applyCollectionSeo({
            title: catName,
            description:
              "Отзывы в категории «" +
              catName +
              "» на ot-ziv.com. Список опубликованных отзывов.",
            url: SITE + "/otzyvy.html?c=" + encodeURIComponent(catKey),
            items: items,
          });
        }

        if (!items.length) {
          if (emptyEl) {
            emptyEl.hidden = false;
            emptyEl.classList.remove("oz-empty-search");
            if (tagKey) emptyEl.textContent = "По этому тегу пока нет отзывов.";
            else emptyEl.textContent = "В этой категории пока нет отзывов.";
          }
          return;
        }
        listEl.innerHTML = items
          .map(function (r) {
            return (
              '<li><a href="' +
              esc(reviewHref(r)) +
              '"><div class="oz-list-name">' +
              esc(r.name) +
              '</div><div class="oz-list-meta"><span class="g" aria-label="' +
              (+r.rating || 0) +
              ' из 5">' +
              stars(r.rating) +
              "</span><span>" +
              esc(fmtDate(r.date) || r.date || "") +
              "</span><span>" +
              esc(r.user || "") +
              "</span></div></a></li>"
            );
          })
          .join("");
      })
      .catch(function () {
        if (emptyEl) {
          emptyEl.hidden = false;
          emptyEl.classList.remove("oz-empty-search");
          emptyEl.textContent = "Не удалось загрузить отзывы.";
        }
      });
  }

  if (window.OZ_TAGS && OZ_TAGS.loadUserTags) {
    OZ_TAGS.loadUserTags().then(runList);
  } else {
    runList();
  }
})();
</script>
