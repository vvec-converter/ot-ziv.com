<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3d7c47">
<meta name="description" content="Опубликованные отзывы на ot-ziv.com">
<link rel="canonical" href="https://ot-ziv.com/otzyvy.html">
<title>Отзывы — ot-ziv.com</title>
<style>
:root{--j:#f0f2f5;--g:#1a1a1a;--e:#666;--f:#dde1e6;--b:#3d7c47;--a:#2f6337;--h:16px;--k:100%;--i:58px;--c:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
body{overflow-x:hidden;font-family:Segoe UI,system-ui,-apple-system,sans-serif;background:var(--j);color:var(--g);line-height:1.5;font-size:16px;padding-bottom:calc(var(--i) + var(--c))}
a{color:#2f5f8f;text-decoration:none}
a:hover{text-decoration:underline}
.dq{width:100%;max-width:var(--k);margin:0 auto;background:#fff;overflow-x:hidden;min-height:100dvh}
.da{padding:0 var(--h)}
.cg{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--f);padding:6px var(--h) 12px}
.cf{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cw{display:flex;align-items:center;line-height:0}
.bl{display:block;height:2.8rem;width:auto;max-width:min(100%,240px)}
.at{display:none}
html[data-theme="dark"] .ab{display:none}
html[data-theme="dark"] .at{display:block}
.bm{width:44px;height:44px;border:1px solid var(--f);border-radius:10px;background:#f8f9fa;font-size:22px;line-height:40px;text-align:center;cursor:pointer;color:var(--g);flex:none}
.bm.ce{background:var(--b);color:#fff;border-color:var(--b)}
.cn{display:none;padding:6px 0 4px}
.cn.dp{display:block}
.cn nav{display:flex;flex-direction:column}
.cn a{display:block;padding:13px 0;font-size:16px;color:var(--g);border-bottom:1px solid var(--f)}
.cn a:last-child{border-bottom:none}
.cn a.dy{color:var(--b);font-weight:600}
.v{display:none}
.dn{padding:0}
.dn>.da{padding:var(--h)}
.dd{border:1px solid var(--f);border-radius:10px;padding:18px var(--h);background:#fff}
.dd h1{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.dd p.dl{color:var(--e);font-size:15px;margin-bottom:16px;line-height:1.45}
.oz-list{list-style:none;margin:0;padding:0}
.oz-list li{border-bottom:1px solid var(--f)}
.oz-list li:last-child{border-bottom:none}
.oz-list a{display:block;padding:14px 0;color:var(--g);text-decoration:none}
.oz-list a:hover{text-decoration:none}
.oz-list-name{font-size:16px;font-weight:700;margin-bottom:4px}
.oz-list-meta{display:flex;flex-wrap:wrap;gap:6px 12px;font-size:13px;color:var(--e)}
.oz-list .g{color:#ffb300;letter-spacing:1px}
.oz-empty{color:var(--e);font-size:15px;padding:8px 0}
.cu{position:fixed;left:0;right:0;bottom:0;z-index:180;display:flex;background:#fff;border-top:1px solid var(--f);padding-bottom:var(--c);min-height:var(--i)}
.cu a{flex:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--e);text-decoration:none;min-height:var(--i)}
.cu a.dy{color:var(--b)}
.ag{padding:8px var(--h) 0}
.d{display:flex;justify-content:flex-end}
.form-group{margin:0}
.form-switch{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--e);cursor:pointer;user-select:none}
.form-switch input{position:absolute;opacity:0;width:0;height:0}
.form-icon{width:36px;height:20px;border-radius:999px;background:#c5ccd3;position:relative;flex:none}
.form-icon::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .15s}
.form-switch input:checked+.form-icon{background:var(--b)}
.form-switch input:checked+.form-icon::after{transform:translateX(16px)}
html[data-theme="dark"]{color-scheme:dark}
html[data-theme="dark"] body{background:#12151a;color:#e8eaed}
html[data-theme="dark"] .dq,html[data-theme="dark"] .cg,html[data-theme="dark"] .dd,html[data-theme="dark"] .cu{background:#1a1f26;border-color:#2a313a}
html[data-theme="dark"] .bm{background:#232a31;border-color:#2a313a;color:#e8eaed}
html[data-theme="dark"] .cn a,html[data-theme="dark"] .oz-list a{color:#e8eaed;border-color:#2a313a}
html[data-theme="dark"] .oz-list-name{color:#e8eaed}
@media(min-width:768px){
:root{--h:24px;--k:820px}
body{padding:18px 16px calc(18px + var(--c))}
.dq{border-radius:12px;box-shadow:0 2px 18px rgba(0,0,0,.06)}
.cg,.cn,.cu{display:none}
.v{display:block;border-bottom:1px solid var(--f);background:#fafbfc}
.v nav{display:flex;flex-wrap:wrap;align-items:center;gap:6px 18px;padding:11px 0}
.v a{color:var(--e);font-size:14px;white-space:nowrap}
.v a.dy{color:var(--b);font-weight:600}
.dd{padding:20px var(--h)}
.dd h1{font-size:1.35rem}
html[data-theme="dark"] .v{background:#151a20;border-color:#2a313a}
}
</style>
</head>
<body>
<div class="dq" id="dq">
<div class="ag">
<div class="d">
<div class="form-group">
<label class="form-switch">
<input type="checkbox" id="darkSwitch" checked>
<i class="form-icon"></i> Тёмная тема
</label>
</div>
</div>
</div>
<div class="cg" id="cg">
<div class="cf">
<div class="cw">
<img class="bl ab" src="i/D.png" alt="ОТЗЫВ" width="240" height="75" decoding="async">
<img class="bl at" src="i/W.png" alt="ОТЗЫВ" width="240" height="75" decoding="async">
</div>
<button type="button" class="bm" id="bm" aria-label="Меню" aria-expanded="false">☰</button>
</div>
<div class="cn" id="cn" aria-hidden="true">
<nav aria-label="Меню">
<a href="index.html">Главная</a>
<a href="index.html#">Мой отзыв</a>
<a href="otzyvy.html" class="dy">Отзывы</a>
</nav>
</div>
</div>
<div class="v">
<div class="da">
<nav aria-label="Верхнее меню">
<a href="index.html">Главная</a>
<a href="index.html#">Мой отзыв</a>
<a href="otzyvy.html" class="dy">Отзывы</a>
</nav>
</div>
</div>
<main class="dn">
<div class="da">
<article class="dd">
<h1>Отзывы</h1>
<p class="dl">Опубликованные отзывы. Нажмите, чтобы открыть.</p>
<ul class="oz-list" id="oz-list"></ul>
<p class="oz-empty" id="oz-empty" hidden>Пока нет опубликованных отзывов.</p>
</article>
</div>
</main>
<nav class="cu" aria-label="Быстрая навигация">
<a href="index.html">Главная</a>
<a href="index.html#">Мой отзыв</a>
<a href="otzyvy.html" class="dy">Отзывы</a>
</nav>
</div>
<script>
(function () {
  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
  function slugify(name) {
    return String(name || "")
      .trim()
      .toLowerCase()
      .replace(/ё/g, "е")
      .replace(/[^a-z0-9а-я]+/gi, "-")
      .replace(/^-+|-+$/g, "");
  }
  function stars(n) {
    n = Math.min(5, Math.max(0, +n || 0));
    return "★".repeat(n) + "☆".repeat(5 - n);
  }
  function fmtDate(d) {
    if (!d) return "";
    try {
      var dt = new Date(d);
      if (isNaN(dt.getTime())) return String(d);
      return dt.toLocaleDateString("ru-RU", {
        day: "numeric",
        month: "long",
        year: "numeric",
      });
    } catch (e) {
      return String(d);
    }
  }
  function reviewHref(r) {
    var key = slugify(r.name) || r.id || "";
    return "otziv.html?id=" + encodeURIComponent(key);
  }

  var darkSwitch = document.getElementById("darkSwitch");
  if (darkSwitch) {
    var saved = localStorage.getItem("t");
    var dark = saved !== "light";
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    darkSwitch.checked = dark;
    darkSwitch.addEventListener("change", function () {
      var on = darkSwitch.checked;
      document.documentElement.setAttribute("data-theme", on ? "dark" : "light");
      localStorage.setItem("t", on ? "dark" : "light");
    });
  }
  var bm = document.getElementById("bm");
  var cn = document.getElementById("cn");
  if (bm && cn) {
    bm.addEventListener("click", function () {
      var open = cn.classList.toggle("dp");
      bm.classList.toggle("ce", open);
      bm.setAttribute("aria-expanded", open ? "true" : "false");
      cn.setAttribute("aria-hidden", open ? "false" : "true");
    });
  }

  var listEl = document.getElementById("oz-list");
  var emptyEl = document.getElementById("oz-empty");
  fetch("data/published.json?t=" + Date.now())
    .then(function (r) {
      if (!r.ok) throw new Error("load");
      return r.json();
    })
    .then(function (data) {
      var items = Array.isArray(data) ? data : [];
      items = items
        .map(function (item) {
          if (!item) return null;
          if (typeof item === "string") return null;
          if (!item.name || !item.text) return null;
          return item;
        })
        .filter(Boolean)
        .reverse();
      if (!items.length) {
        if (emptyEl) emptyEl.hidden = false;
        return;
      }
      listEl.innerHTML = items
        .map(function (r) {
          return (
            '<li><a href="' +
            esc(reviewHref(r)) +
            '"><div class="oz-list-name">' +
            esc(r.name) +
            '</div><div class="oz-list-meta"><span>' +
            esc(r.category || "") +
            '</span><span class="g" aria-label="' +
            (+r.rating || 0) +
            ' из 5">' +
            stars(r.rating) +
            "</span><span>" +
            esc(fmtDate(r.date) || r.date || "") +
            "</span><span>" +
            esc(r.user || "") +
            "</span></div></a></li>"
          );
        })
        .join("");
    })
    .catch(function () {
      if (emptyEl) {
        emptyEl.hidden = false;
        emptyEl.textContent = "Не удалось загрузить отзывы.";
      }
    });
})();
</script>
</body>
</html>
